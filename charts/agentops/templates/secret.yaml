apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "agentops.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_SECRET_SECONDARY: {{ .Values.secrets.jwtSecretSecondary | quote }}
  MFA_ENCRYPTION_KEY: {{ .Values.secrets.mfaEncryptionKey | quote }}
