apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web-svc
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "agentops.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: {{ .Release.Name }}-web
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
  type: ClusterIP
