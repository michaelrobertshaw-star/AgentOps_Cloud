# SECRET TEMPLATE — do NOT commit real values.
# Populate with: kubectl create secret generic agentops-secrets --from-env-file=.env.prod -n agentops
# Or use an external secrets manager (e.g., Vault, AWS Secrets Manager, Sealed Secrets).
apiVersion: v1
kind: Secret
metadata:
  name: agentops-secrets
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentops
type: Opaque
stringData:
  # Database
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  # Redis
  REDIS_PASSWORD: "REPLACE_ME"
  # MinIO / S3
  S3_ACCESS_KEY: "REPLACE_ME"
  S3_SECRET_KEY: "REPLACE_ME"
  # JWT signing secrets (generate with: openssl rand -hex 64)
  JWT_SECRET: "REPLACE_ME"
  JWT_SECRET_SECONDARY: ""
  # MFA encryption key (exactly 32 bytes)
  MFA_ENCRYPTION_KEY: "REPLACE_ME_32_BYTES_EXACTLY!!!!!"
